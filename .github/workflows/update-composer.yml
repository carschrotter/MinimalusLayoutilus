name: Generate composer.json for Packagist

on:
  push:
    branches: [ master ]
    paths:
      - 'composer.local.json'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate composer.json from composer.local.json
        run: |
          php -r "
            \$local = json_decode(file_get_contents('composer.local.json'), true);

            // Strip local-only fields
            unset(\$local['repositories']);

            // Stable settings for Packagist
            \$local['minimum-stability'] = 'stable';
            \$local['prefer-stable'] = true;

            // Pin mnhcc/* to stable semver range instead of wildcard
            foreach (['mnhcc/ml-core', 'mnhcc/ml-bugcatcher', 'mnhcc/ml-mvc'] as \$pkg) {
                if (isset(\$local['require'][\$pkg])) {
                    \$local['require'][\$pkg] = '^0.9';
                }
            }

            // Replace kint dev alias with stable constraint
            if (isset(\$local['require-dev']['kint-php/kint'])) {
                \$local['require-dev']['kint-php/kint'] = '^4.0';
            }

            // Packagist metadata
            \$local['keywords'] = ['framework', 'mvc', 'template', 'starter', 'php54'];
            \$local['homepage'] = 'https://github.com/carschrotter/MinimalusLayoutilus';
            \$local['support'] = [
                'issues' => 'https://github.com/carschrotter/MinimalusLayoutilus/issues',
                'source' => 'https://github.com/carschrotter/MinimalusLayoutilus',
            ];

            file_put_contents(
                'composer.json',
                json_encode(\$local, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . PHP_EOL
            );
          "

      - name: Commit updated composer.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add composer.json
          git diff --cached --quiet || git commit -m "chore: regenerate composer.json from composer.local.json [skip ci]"
          git push
