name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['5.6', '7.0', '7.1']
    name: PHP ${{ matrix.php }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: MinimalusLayoutilus

      - uses: actions/checkout@v4
        with:
          repository: carschrotter/ml-core
          path: ml-core

      - uses: actions/checkout@v4
        with:
          repository: carschrotter/ml-bugcatcher
          path: ml-bugcatcher

      - uses: actions/checkout@v4
        with:
          repository: carschrotter/ml-mvc
          path: ml-mvc

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Inject path repositories for checked-out packages
        working-directory: MinimalusLayoutilus
        run: |
          composer config repositories.ml-core      '{"type":"path","url":"../ml-core"}'
          composer config repositories.ml-bugcatcher '{"type":"path","url":"../ml-bugcatcher"}'
          composer config repositories.ml-mvc        '{"type":"path","url":"../ml-mvc"}'
          composer config minimum-stability dev
          composer config prefer-stable true

      - name: Install dependencies
        working-directory: MinimalusLayoutilus
        run: composer install --no-progress --prefer-dist

      - name: Run tests
        working-directory: MinimalusLayoutilus
        run: vendor/bin/phpunit
